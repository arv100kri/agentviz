name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Verify screenshots exist
        run: |
          for file in landing session-hero replay-view tracks-view stats-view; do
            if [ ! -f "docs/screenshots/${file}.png" ]; then
              echo "::error::Missing screenshot: docs/screenshots/${file}.png"
              echo "README references this screenshot. Please capture it and commit."
              exit 1
            fi
          done
          echo "All referenced screenshots present."
